services:
  - type: web
    name: optilogix
    runtime: node
    region: oregon
    plan: free
    buildCommand: npm ci --omit=optional
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_OPTIONS
        value: --max-old-space-size=400
      - key: NEXTAUTH_URL
        sync: false
      - key: NEXTAUTH_SECRET
        sync: false
      - key: MOONSHOT_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: BACKEND_URL
        sync: false
